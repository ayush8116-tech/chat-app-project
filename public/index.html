<!DOCTYPE html>
<html lang="en">
  <head>
    <title>chat-app</title>
    <link rel="stylesheet" href="/public/styles/style.css">
    <script type="module" src="/public/scripts/script.js"></script>
  </head>

  <body>
    <div class="main">
      <article class="contact-bar"></article>
      <article class="chat-container">
        <section class="chat-box"></section>
        <section class="message-input-container">
          <input type="text" class="message-box" id="message-input">
          <button type="button" class="action send-button" name="send">
            Send
          </button>
        </section>
      </article>
    </div>
  </body>
</html>
